<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GymPlan">
<meta name="theme-color" content="#3b82f6">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Plan de Entrenamiento</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f0f0f;color:#e5e5e5;font-size:15px}

/* HEADER */
.header{background:#1a1a1a;border-bottom:1px solid #2a2a2a;padding:12px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;gap:12px}
.header-logo{width:34px;height:34px;border-radius:8px;flex-shrink:0;overflow:hidden}
.header-logo img{width:100%;height:100%;object-fit:cover;display:block}
.header-title{font-size:17px;font-weight:600;color:#f5f5f5;text-align:center;flex:1}






/* SLIDE MENU */









/* TABS */
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px 12px;background:#1a1a1a;border-bottom:1px solid #2a2a2a}
.tab{padding:9px 4px;border-radius:10px;border:1px solid #333;background:#242424;font-size:13px;cursor:pointer;color:#888;text-align:center;font-weight:500;transition:all .2s}
.tab.active{background:#1e3a5f;color:#60a5fa;border-color:#3b82f6;font-weight:700}

/* PERSON SELECTOR */









.back-btn:active{background:#333}

/* CONTENT */
.content{padding:0;max-width:800px;margin:0 auto;width:100%}
.section{display:none}
.section.active{display:block;padding:8px}

/* WEEK */
.week-label{font-size:12px;font-weight:600;color:#999;margin-bottom:6px;margin-top:14px}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.wday{text-align:center}.wday-n{font-size:10px;color:#555;margin-bottom:3px;font-weight:600}
.wday-c{font-size:10px;font-weight:700;padding:5px 2px;border-radius:6px}
.wp{background:#2a1500;color:#f97316}.wu{background:#14532d;color:#4ade80}.wl{background:#451a03;color:#60a5fa}.wr{background:#1f1f1f;color:#555}.wo{background:#3b0764;color:#c084fc}

/* NOTE BOXES */
.note{border-left:3px solid #3b82f6;padding:10px 14px;background:#1f1409;border-radius:0 8px 8px 0;margin:10px 0;font-size:13px;color:#60a5fa;line-height:1.5}
.note strong{color:#f5f5f5}
.note-blue{border-left:3px solid #3b82f6;padding:10px 14px;background:#0f1f3d;border-radius:0 8px 8px 0;margin:10px 0;font-size:13px;color:#93c5fd;line-height:1.5}
.note-blue strong{color:#f5f5f5}
.note-green{border-left:3px solid #22c55e;padding:10px 14px;background:#0a1f12;border-radius:0 8px 8px 0;margin:10px 0;font-size:13px;color:#86efac;line-height:1.5}
.note-green strong{color:#f5f5f5}

.section-title{font-size:15px;font-weight:600;margin:18px 0 10px;color:#f5f5f5}
.tip-list{list-style:none}
.tip-list li{padding:9px 0;border-bottom:1px solid #2a2a2a;font-size:13px;color:#c0c0c0;display:flex;gap:10px;line-height:1.5}
.tip-list li:last-child{border-bottom:none}
.tip-list li strong{color:#e5e5e5}

/* DAY CARD */
.day-card{background:transparent;margin-bottom:0;overflow:visible}
.day-header{display:flex;align-items:center;gap:8px;padding:10px 0 10px;flex-wrap:wrap}
.day-badge{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;white-space:nowrap}
.push-b{background:#2a1500;color:#f97316}.pull-b{background:#14532d;color:#4ade80}.legs-b{background:#451a03;color:#60a5fa}.opt-b{background:#3b0764;color:#c084fc}
.day-title-t{font-size:14px;font-weight:600;color:#f5f5f5;flex:1}
.day-count{font-size:11px;color:#999!important;background:#242424!important;padding:2px 8px;border-radius:20px}
.day-sub-t{font-size:12px;color:#888}
.chev{display:none}
.collapsible{display:block}

/* EXERCISE */
.ex-block{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;margin-bottom:8px;overflow:hidden;padding:8px}
.ex-block:last-child{margin-bottom:8px}
.ex-num{font-size:10px;font-weight:700;color:#666;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:3px}
.ex-name{font-size:14px;font-weight:600;color:#3b82f6;margin-bottom:8px}
.ex-desc{font-size:13px;color:#b0b0b0;line-height:1.6;margin-bottom:10px}

/* SERIES TABLE */
.series-table{width:100%;border-collapse:collapse;margin-bottom:10px;border-radius:8px;overflow:hidden;border:1px solid #2a2a2a}
.series-table th{background:#242424;font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.05em;padding:7px 10px;text-align:left;border-bottom:1px solid #2a2a2a}
.series-table td{padding:8px 10px;font-size:13px;border-bottom:1px solid #1f1f1f;color:#ddd}
.series-table tr:last-child td{border-bottom:none}
.series-table{margin-bottom:0}
.table-divider{height:1px;background:#2a2a2a;margin:12px 0}
.series-table .s1{color:#666}
.series-table .s2{color:#f97316;font-weight:500}
.series-table .s3{color:#3b82f6;font-weight:600}
.series-table .s1-m{color:#666}
.series-table .s2-m{color:#4ade80;font-weight:500}
.series-table .s3-m{color:#60a5fa;font-weight:600}
.series-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-right:4px}
.b-s1{background:#242424;color:#666}
.b-s2{background:#2a1500;color:#f97316}
.b-s3{background:#431407;color:#3b82f6}

/* REST BOXES */
.rest-box{display:none}
.rest-box span{font-weight:600;color:#aaa}
.inter-rest{display:flex;align-items:center;justify-content:center;font-size:12px;color:#c084fc;background:#0f1a0a;border:1px solid #1a3a1a;border-radius:8px;padding:7px 12px;margin:0 0 8px;font-weight:500;text-align:center}

/* POSTURA */
.postura-box{background:#1f1f1f;border:1px solid #2a2a2a;border-radius:8px;padding:12px;margin-bottom:10px;font-size:12px;color:#b0b0b0;line-height:1.6}
.postura-box .postura-title{font-size:11px;font-weight:700;color:#ccc;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.postura-section{font-size:13px;color:#b0b0b0;line-height:1.6;margin-bottom:8px}
.postura-section:last-child{margin-bottom:0}
.postura-section strong{color:#f0f0f0;font-weight:600}

/* MUSCLES / PILLS */
.muscles{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.pill{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500}
.p-muscle{background:#2a2a2a;color:#aaa;border:1px solid #333}
.p-new{background:#451a03;color:#60a5fa;border:1px solid #7c2d12}
.hidden{display:none!important}

/* FITWILL LINK */
.ex-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#3b82f6;text-decoration:none;margin-top:12px;margin-bottom:16px;font-weight:500}
.ex-link:active{background:#2a1500}
.ex-link svg{flex-shrink:0}

/* RATING */
.rating{display:flex;gap:10px;margin-top:12px;padding-top:10px;border-top:1px solid #222}
.rate-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border-radius:10px;border:1.5px solid #333;background:#1f1f1f;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;color:#888}
.rate-btn.like.selected{background:#14532d;border-color:#22c55e;color:#4ade80}
.rate-btn.dislike.selected{background:#450a0a;border-color:#ef4444;color:#f87171}
.rate-icon{font-size:16px}

/* STRETCH */
.stretch-section{background:#0a1f12;border:1px solid #14532d;border-radius:10px;margin:14px 0;padding:14px}
.stretch-title{font-size:12px;font-weight:700;color:#4ade80;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.stretch-item{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid #14532d;font-size:13px;color:#c0c0c0;line-height:1.5}
.stretch-item:last-child{border-bottom:none}
.stretch-item .s-time{font-size:11px;font-weight:600;color:#4ade80;background:#14532d;padding:2px 7px;border-radius:20px;white-space:nowrap;height:fit-content;margin-top:2px;flex-shrink:0}

/* PROGRESS */
.progress-person-tabs{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-bottom:14px;border:1.5px solid #3b82f6;border-radius:10px;overflow:hidden}
.ppt-btn{padding:8px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;color:#3b82f6;background:transparent;border:none}
.ppt-btn.active{background:#3b82f6;color:#fff}
.ppt-btn:first-child{border-right:1px solid rgba(249,115,22,0.4)}
.chart-wrap{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:14px;margin-bottom:12px}
.chart-title{font-size:12px;color:#888;margin-bottom:10px;font-weight:500}
.chart-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.chart-label{font-size:11px;color:#aaa;width:80px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chart-bar-bg{flex:1;height:16px;background:#242424;border-radius:8px;overflow:hidden}
.chart-bar-fill{height:100%;border-radius:8px;transition:width .4s ease;background:#3b82f6}
.chart-bar-fill.good{background:#22c55e}
.chart-bar-pct{font-size:11px;color:#888;width:32px;text-align:right;flex-shrink:0}
.progress-section{margin-bottom:24px}
.progress-entreno-title{font-size:14px;font-weight:700;color:#3b82f6;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #2a2a2a}
.progress-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.progress-table th{background:#242424;color:#888;padding:6px 8px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:0.05em}
.progress-table td{padding:7px 8px;border-bottom:1px solid #1f1f1f;color:#ccc;vertical-align:middle}
.progress-table tr:last-child td{border-bottom:none}
.ptag{display:inline-block;font-size:10px;padding:2px 6px;border-radius:20px;font-weight:600}
.ptag.ok{background:#14532d;color:#4ade80}
.ptag.ko{background:#450a0a;color:#f87171}
.ptag.none{background:#242424;color:#555}
.no-data{text-align:center;padding:32px 16px;color:#555;font-size:13px}

/* PHASES */
.phases{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.phase{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:12px;text-align:center}
.phase-label{font-size:10px;color:#555;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px}
.phase-val{font-size:22px;font-weight:700}
.phase-sub{font-size:11px;color:#999;margin-top:2px}

/* COLLAPSIBLE EXERCISES */
.ex-block{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;margin-bottom:8px;overflow:hidden;padding:8px}
.ex-block:last-child{margin-bottom:8px}
.ex-toggle{display:flex;align-items:center;justify-content:space-between;padding:8px;cursor:pointer;user-select:none;gap:8px}
.ex-toggle-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.ex-toggle-num{font-size:10px;font-weight:700;color:#555;letter-spacing:0.08em;flex-shrink:0}
.ex-toggle-name{font-size:14px;font-weight:600;color:#3b82f6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-toggle-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.ex-status{display:none}
.ex-status.done{display:none}
.ex-status.skip{display:none}
.ex-status.pending{display:none}
.ex-chevron{font-size:16px;color:#666;transition:transform .2s;flex-shrink:0}
.ex-chevron.open{transform:rotate(180deg)}
.ex-body{display:block;padding:0 0 12px}

/* override old ex rules inside ex-body */
.ex-body .ex-num{display:none}
.ex-body .ex-name{display:none}


/* COMPLETE BUTTON */
.complete-btn{display:flex;align-items:center;justify-content:center;width:100%;padding:16px;margin-top:16px;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:0.02em;border:1.5px solid #3b82f6;background:transparent;color:#3b82f6}
.complete-btn:active{opacity:0.8;transform:scale(0.98)}
.complete-btn.done{background:#14532d;border-color:#22c55e;color:#4ade80}
.complete-toast{display:none}
.complete-toast.show{opacity:1}





.rate-col{width:56px;text-align:center}
.series-rate{display:flex;gap:6px;justify-content:center;align-items:center}
.series-rate-btn{width:28px;height:28px;border-radius:8px;border:1px solid #333;background:#1f1f1f;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s;flex-shrink:0}
.series-rate-btn.ok{background:#14532d;border-color:#22c55e;color:#4ade80;pointer-events:none}
.series-rate-btn.ko{background:#450a0a;border-color:#ef4444;color:#f87171;pointer-events:none}
.series-rate-btn.hidden-btn{display:none}
.ptag.partial{background:#451a03;color:#60a5fa}
.ex-toggle-num{display:none}

.prog-session{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;margin-bottom:8px;overflow:hidden}
.prog-session-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;user-select:none}
.prog-session-date{font-size:15px;font-weight:600;color:#f5f5f5}
.prog-session-summary{font-size:12px;color:#888}
.prog-session-body{display:none;border-top:1px solid #2a2a2a}
.prog-session-body.open{display:block}
.prog-ex{padding:10px 14px;border-bottom:1px solid #1f1f1f}
.prog-ex:last-child{border-bottom:none}
.prog-ex-name{font-size:13px;font-weight:600;color:#e5e5e5;margin-bottom:6px}
.prog-serie-row{display:flex;align-items:center;gap:8px;font-size:12px;color:#aaa;padding:2px 0}
.prog-serie-label{color:#666;min-width:40px}
.prog-serie-weight{color:#ccc;flex:1}
.prog-serie-ok{color:#4ade80;font-size:14px}
.prog-serie-ko{color:#f87171;font-size:14px}
.prog-serie-none{color:#444;font-size:14px}

.ex-section-title{display:none}
.serie-list{display:flex;gap:8px;margin:10px 0 14px;padding:0 12px}
.serie-box{flex:1;background:#222;border-radius:8px;padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center}
.sb-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em}
.sb-weight{font-size:15px;font-weight:700;color:#f5f5f5}
.sb-reps{font-size:11px;color:#888}
.serie-box.s1-box .sb-label{color:#f97316}
.serie-box.s2-box .sb-label{color:#818cf8}
.serie-box.s3-box .sb-label{color:#3b82f6}
.ex-divider{border:none;border-top:1px solid #2a2a2a;margin:0 0 12px}
.ex-toggle{padding:10px 12px 6px;cursor:default}
.ex-toggle-name{font-size:14px;font-weight:600;color:#3b82f6}
.postura-section{font-size:13px;color:#b0b0b0;line-height:1.6;margin-bottom:6px;padding:0 12px}
.ex-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#3b82f6;text-decoration:none;margin:8px 0 10px;font-weight:500;padding:0 12px}
.ex-section-title{display:none}

.info-toggle{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#222;border-radius:8px;cursor:pointer;margin-bottom:4px;user-select:none}
.info-toggle-label{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.05em}
.info-toggle-chevron{font-size:12px;color:#555;transition:transform 0.2s}
.info-toggle.open .info-toggle-chevron{transform:rotate(180deg)}
.info-body{display:none;padding:6px 12px 10px;font-size:13px;color:#b0b0b0;line-height:1.6}
.info-body.open{display:block}
.info-body p{margin:3px 0}
.ex-detail-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#f97316;text-decoration:none;margin:8px 0 4px;padding:0 12px;font-weight:500}
.ex-detail-link:active{color:#93c5fd}

#welcome-screen{position:fixed;inset:0;background:#0f0f0f;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;gap:32px}
#welcome-screen.hidden{display:none}
.welcome-logo{width:72px;height:72px;border-radius:16px;overflow:hidden}
.welcome-logo img{width:100%;height:100%;object-fit:cover}
.welcome-title{font-size:22px;font-weight:700;color:#f5f5f5;text-align:center}
.welcome-subtitle{font-size:14px;color:#888;text-align:center;margin-top:-20px}
.welcome-btns{display:flex;flex-direction:column;gap:12px;width:100%;max-width:280px}
.welcome-btn{display:flex;align-items:center;gap:14px;padding:16px 20px;border-radius:14px;border:1px solid #2a2a2a;background:#1a1a1a;cursor:pointer;transition:all .2s}
.welcome-btn:active{transform:scale(0.98)}
.welcome-btn-avatar{width:44px;height:44px;border-radius:50%;overflow:hidden;flex-shrink:0}
.welcome-btn-avatar img{width:100%;height:100%;object-fit:cover}
.welcome-btn-name{font-size:17px;font-weight:600;color:#f5f5f5}
.welcome-btn-sub{font-size:12px;color:#888;margin-top:2px}
.welcome-btn.angel-btn{border-color:#3b82f6;background:#0f1e35}
.welcome-btn.manu-btn{border-color:#3b82f6;background:#0f1e35}

.header-avatar{width:34px;height:34px;border-radius:50%;overflow:hidden;cursor:pointer;border:2px solid #3b82f6;flex-shrink:0;transition:opacity .15s}
.header-avatar:active{opacity:0.7}
.header-avatar img{width:100%;height:100%;object-fit:cover;display:block}
.header{position:relative}

/* ── MANU THEME: swap blue ↔ orange ─────────────────────────────── */
body.theme-manu .tab.active{background:#2a1500;color:#f97316;border-color:#ea580c}
body.theme-manu .ex-toggle-name{color:#f97316}
body.theme-manu .ex-detail-link{color:#3b82f6}
body.theme-manu .serie-box.s1-box .sb-label{color:#3b82f6}
body.theme-manu .serie-box.s3-box .sb-label{color:#f97316}
body.theme-manu .header-avatar{border-color:#f97316}
body.theme-manu body.theme-manu .stretch-title{color:#f97316}


.finish-btn{display:flex;align-items:center;justify-content:center;width:100%;padding:16px;margin:24px 0 8px;background:#1e3a5f;border:1px solid #3b82f6;border-radius:14px;color:#60a5fa;font-size:15px;font-weight:700;cursor:pointer;gap:8px;transition:all .2s}
.finish-btn:active{background:#2a4a7f;transform:scale(0.98)}
body.theme-manu .finish-btn{background:#2a1500;border-color:#f97316;color:#f97316}

.finish-btn.completed,.finish-btn:disabled{background:#0a2a0a;border-color:#22c55e;color:#22c55e;cursor:default;opacity:0.85}
.finish-btn.completed:active{transform:none}
body.theme-manu .finish-btn.completed{background:#0a2a0a;border-color:#22c55e;color:#22c55e}
</style>
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1">
function toggleInfo(el) {
  el.classList.toggle('open');
  const body = el.nextElementSibling;
  if (body) body.classList.toggle('open');
}

function selectPerson(p) {
  localStorage.setItem('gymplan-user', p);
  document.getElementById('welcome-screen').classList.add('hidden');
  document.querySelectorAll('.section').forEach(s => setPerson(p, s));
  localStorage.setItem('gymplan-person', p);
}

function checkWelcome() {
  const user = localStorage.getItem('gymplan-user');
  if (user) {
    document.getElementById('welcome-screen').classList.add('hidden');
    document.querySelectorAll('.section').forEach(s => setPerson(user, s));
    localStorage.setItem('gymplan-person', user);
  }
  // else: welcome screen stays visible
}

function initAvatar() {

function toggleComplete(sid, nextId, doneLabel) {
  const btn = document.getElementById('btn-' + sid);
  const isDone = btn.classList.contains('done');

  if (isDone) {
    // Undo: mark as not done
    btn.classList.remove('done');
    btn.textContent = 'Finalizar entreno';
    // Remove from completed set
    const completed = getCompleted();
    delete completed[sid];
    saveCompleted(completed);
    // Recompute next section
    updateNextSection(completed);
  } else {
    // Mark as done
    btn.classList.add('done');
    btn.textContent = doneLabel;
    // Save to completed set
    const completed = getCompleted();
    completed[sid] = { ts: Date.now(), date: new Date().toISOString().split('T')[0] };
    saveCompleted(completed);
    updateNextSection(completed);
    // Show toast
    const toast = document.getElementById('complete-toast');
    toast.innerHTML = '<i class="ph ph-check"></i> ' + doneLabel;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
    // Move to next section
    setTimeout(() => showSection(nextId), 600);
  }
}

function getCompleted() {
  try {
    const raw = localStorage.getItem('gymplan-completed');
    if (!raw) return {};
    return JSON.parse(raw);
  } catch { return {}; }
}

function saveCompleted(data) {
  localStorage.setItem('gymplan-completed', JSON.stringify(data));
}

function updateNextSection(completed) {
  // Determine which section to show next: first uncompleted in order
  const order = ['e1','e2','e3','eopt'];
  const next = order.find(s => !completed[s]) || 'e1';
  localStorage.setItem('gymplan-next-section', JSON.stringify({
    nextSection: next,
    completedAt: Date.now()
  }));
}

function loadCompletedButtons() { /* removed */ }

function getStartSection() {
  const today = new Date();
  // Monday: reset everything
  if (today.getDay() === 1) {
    const lastReset = localStorage.getItem('gymplan-last-reset');
    const todayStr = today.toISOString().split('T')[0];
    if (lastReset !== todayStr) {
      localStorage.removeItem('gymplan-completed');
      localStorage.removeItem('gymplan-next-section');
      localStorage.setItem('gymplan-last-reset', todayStr);
    }
    return 'e1';
  }
  // Other days: first uncompleted section
  const completed = getCompleted();
  const order = ['e1','e2','e3','eopt'];
  return order.find(s => !completed[s]) || 'e1';
}

  if (avatarImg) avatarImg.src = myProfile === 'angel' ? window._angelSrc : window._manuSrc;

}

function setPerson(p, section) {
  if (!section) return;
  localStorage.setItem('gymplan-person', p);
  section.querySelectorAll('.sangel').forEach(el => el.style.display = p==='angel' ? '' : 'none');
  section.querySelectorAll('.smanu').forEach(el => el.style.display = p==='manu' ? '' : 'none');
}

function toggleViewPerson() {
  const myProfile = localStorage.getItem('gymplan-user') || 'angel';
  const currentView = window._currentView || myProfile;
  const newView = currentView === 'angel' ? 'manu' : 'angel';
  window._currentView = newView;
  document.querySelectorAll('.section').forEach(s => setPerson(newView, s));
  const avatarImg = document.getElementById('header-avatar-img');
  if (avatarImg) avatarImg.src = newView === 'angel' ? window._angelSrc : window._manuSrc;
  document.body.classList.toggle('theme-manu', newView === 'manu');
}

function selectPerson(p) {
  localStorage.setItem('gymplan-user', p);
  localStorage.setItem('gymplan-person', p);
  document.getElementById('welcome-screen').classList.add('hidden');
  document.querySelectorAll('.section').forEach(s => setPerson(p, s));
  initAvatar();
}

function checkWelcome() {
  const user = localStorage.getItem('gymplan-user');
  if (user) {
    document.getElementById('welcome-screen').classList.add('hidden');
    document.querySelectorAll('.section').forEach(s => setPerson(user, s));
    localStorage.setItem('gymplan-person', user);
    initAvatar();
  }
}

function finishEntreno(current) {
  // Mark as completed
  const completed = JSON.parse(localStorage.getItem('gymplan-completed-v2') || '{}');
  if (completed[current]) return; // already done
  completed[current] = true;
  localStorage.setItem('gymplan-completed-v2', JSON.stringify(completed));
  
  // Update button UI
  const btn = document.querySelector('#' + current + ' .finish-btn');
  if (btn) {
    btn.classList.add('completed');
    btn.innerHTML = '✓ Entreno finalizado';
    btn.disabled = true;
  }
  
  // Navigate to next section after brief delay
  const idx = SECTION_ORDER.indexOf(current);
  const next = SECTION_ORDER[(idx + 1) % SECTION_ORDER.length];
  localStorage.setItem('gymplan-current', next);
  setTimeout(() => {
    showSection(next);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, 400);
}

function loadCompletedButtons() {
  const completed = JSON.parse(localStorage.getItem('gymplan-completed-v2') || '{}');
  SECTION_ORDER.forEach(sid => {
    if (completed[sid]) {
      const btn = document.querySelector('#' + sid + ' .finish-btn');
      if (btn) {
        btn.classList.add('completed');
        btn.innerHTML = '✓ Entreno finalizado';
        btn.disabled = true;
      }
    }
  });
}

function checkWeeklyReset() {
  const now = new Date();
  const isSunday = now.getDay() === 0;
  const isPastReset = now.getHours() > 23 || (now.getHours() === 23 && now.getMinutes() >= 30);
  const lastReset = localStorage.getItem('gymplan-last-weekly-reset');
  const todayStr = now.toISOString().split('T')[0];
  if (isSunday && isPastReset && lastReset !== todayStr) {
    localStorage.setItem('gymplan-current', 'e1');
    localStorage.removeItem('gymplan-completed-v2');
    localStorage.setItem('gymplan-last-weekly-reset', todayStr);
    return 'e1';
  }
  return localStorage.getItem('gymplan-current') || 'e1';
}

const SECTION_ORDER = ['e1','e2','e3','eopt'];

function getCompleted() {
  return JSON.parse(localStorage.getItem('gymplan-done') || '{}');
}

function saveCompleted(obj) {
  localStorage.setItem('gymplan-done', JSON.stringify(obj));
}

function applyCompletedUI() {
  const done = getCompleted();
  SECTION_ORDER.forEach(sid => {
    const btn = document.querySelector('#' + sid + ' .finish-btn');
    if (!btn) return;
    if (done[sid]) {
      btn.classList.add('completed');
      btn.innerHTML = '&#10003; Entreno finalizado';
      btn.disabled = true;
    } else {
      btn.classList.remove('completed');
      btn.innerHTML = 'Finalizar entreno &rarr;';
      btn.disabled = false;
    }
  });
}

function finishEntreno(sid) {
  const done = getCompleted();
  if (done[sid]) return;
  done[sid] = true;
  saveCompleted(done);

  // If finishing eopt (last), reset all completed state
  if (sid === 'eopt') {
    saveCompleted({});
  }

  applyCompletedUI();

  // Jump to next section
  const idx = SECTION_ORDER.indexOf(sid);
  const next = SECTION_ORDER[(idx + 1) % SECTION_ORDER.length];
  localStorage.setItem('gymplan-current', next);
  setTimeout(() => {
    showSection(next);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, 300);
}

function checkWeeklyReset() {
  const now = new Date();
  const isSunday = now.getDay() === 0;
  const past2330 = now.getHours() > 23 || (now.getHours() === 23 && now.getMinutes() >= 30);
  const todayStr = now.toISOString().split('T')[0];
  const lastReset = localStorage.getItem('gymplan-weekly-reset');
  if (isSunday && past2330 && lastReset !== todayStr) {
    localStorage.setItem('gymplan-weekly-reset', todayStr);
    localStorage.setItem('gymplan-current', 'e1');
    saveCompleted({});
  }
  return localStorage.getItem('gymplan-current') || 'e1';
}
